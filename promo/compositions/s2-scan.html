<template id="s2-scan-template">
<div id="s2-scan" data-composition-id="s2-scan" data-start="0" data-width="1920" data-height="1080">

  <div class="glow"></div>
  <div class="sweep"></div>

  <div class="c">
    <div class="hd"><span class="ic">⚡</span><span class="ht">Scanning your environment</span></div>
    <div class="rows">
      <div class="r"><span class="ck">✓</span> settings.json — <span class="v">2 MCP servers</span></div>
      <div class="r"><span class="ck">✓</span> GEMINI.md — <span class="v">847 words</span></div>
      <div class="r"><span class="ck">✓</span> skills/ — <span class="v">5 custom skills</span></div>
      <div class="r"><span class="ck">✓</span> extensions/ — <span class="v">14 extensions</span></div>
      <div class="r"><span class="ck">✓</span> agents/ — <span class="v">40 agents found</span></div>
      <div class="r rh"><span class="ck ch">✓</span> chats/*.jsonl — <span class="vh">16 sessions · 26.1M tokens</span></div>
      <div class="r rd"><span class="ck cd">✓</span> <span class="vd">Complete — 0.8s</span></div>
    </div>
    <div class="bar"><div class="fill"></div></div>
    <div class="out"><span class="oa">→</span> scan-results/gemini-env-report.md</div>
    <div class="sc">
      <span class="sl">Score:</span>
      <span class="sn">87</span><span class="ss">/105</span>
      <span class="sv">— Power User</span>
    </div>
  </div>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap');
    #s2-scan { background:#000; color:#E2E8F0; font-family:'JetBrains Mono',monospace; overflow:hidden; }
    .glow { position:absolute; right:-60px; top:25%; width:350px; height:450px; background:radial-gradient(circle,rgba(0,255,200,0.07),transparent 70%); filter:blur(60px); z-index:0; }
    .sweep { position:absolute; left:0; right:0; height:2px; top:-2px; background:linear-gradient(90deg,transparent,rgba(0,255,200,0.35),transparent); z-index:3; }
    .c { position:relative; z-index:2; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; padding:50px 160px; gap:4px; }
    .hd { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .ic { font-size:32px; }
    .ht { font-family:'Space Grotesk',sans-serif; font-size:36px; font-weight:800; background:linear-gradient(90deg,#00FFC8,#fff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .rows { display:flex; flex-direction:column; gap:2px; }
    .r { font-size:20px; color:#475569; padding:3px 0; }
    .ck { color:#00FFC8; margin-right:8px; }
    .v { color:#94A3B8; }
    .rh { color:#FFAA00 !important; }
    .ch { color:#FFAA00; }
    .vh { color:#FFAA00; font-weight:600; }
    .rd { margin-top:4px; }
    .cd { color:#27C93F; }
    .vd { color:#27C93F; font-weight:600; }
    .bar { width:100%; height:5px; background:#111; margin-top:12px; }
    .fill { width:100%; height:100%; background:linear-gradient(90deg,#00FFC8,#FFAA00,#27C93F); transform-origin:left; transform:scaleX(0); }
    .out { font-size:16px; color:#475569; margin-top:8px; }
    .oa { color:#00FFC8; }
    .sc { margin-top:12px; display:flex; align-items:baseline; gap:6px; }
    .sl { font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; color:#94A3B8; }
    .sn { font-family:'Space Grotesk',sans-serif; font-size:56px; font-weight:900; color:#FFAA00; line-height:1; }
    .ss { font-size:30px; color:#475569; }
    .sv { font-size:20px; color:#27C93F; font-weight:600; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });
    tl.to(".sweep", { top:"100%", duration:.6, ease:"none", repeat:3, repeatDelay:.2 }, 0);
    tl.from(".hd", { opacity:0, x:-10, duration:.15, ease:"power3.out" }, 0.1);
    var d = [0.3, 0.5, 0.7, 0.9, 1.1, 1.4, 1.7];
    d.forEach(function(t,i){ tl.from(".r:nth-child("+(i+1)+")", { opacity:0, x:-8, duration:.1, ease:"expo.out" }, t); });
    tl.to(".fill", { scaleX:1, duration:1.6, ease:"power1.out" }, 0.3);
    tl.from(".out", { opacity:0, y:5, duration:.15, ease:"sine.out" }, 2.0);
    tl.from(".sc", { opacity:0, y:8, duration:.2, ease:"power2.out" }, 2.2);
    tl.from(".sn", { scale:.5, duration:.25, ease:"back.out(1.5)" }, 2.3);
    tl.to(".glow", { scale:1.2, duration:3, ease:"sine.inOut", yoyo:true, repeat:1 }, 0.2);
    window.__timelines["s2-scan"] = tl;
  </script>
</div>
</template>
