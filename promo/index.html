<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body { margin: 0; padding: 0; background: #000; }
    #tui-promo { background: #000; }
  </style>
</head>
<body>
<div id="tui-promo" data-composition-id="tui-promo" data-start="0" data-duration="20" data-width="1920" data-height="1080">

  <!-- Scene 1: Title flash (0-3s) -->
  <div id="s1" class="clip" data-composition-id="s1-title" data-composition-src="compositions/s1-title.html"
    data-start="0" data-duration="3" data-track-index="0"></div>

  <!-- Scene 2: Scan + Score flash (3-6s) -->
  <div id="s2" class="clip" data-composition-id="s2-scan" data-composition-src="compositions/s2-scan.html"
    data-start="3" data-duration="3" data-track-index="0"></div>

  <!-- Scene 3: HERO — Conversations → Skills (6-16s) — 10 seconds, the star -->
  <div id="s3" class="clip" data-composition-id="s3-skills" data-composition-src="compositions/s3-skills.html"
    data-start="6" data-duration="10" data-track-index="0"></div>

  <!-- Scene 4: CTA (16-20s) -->
  <div id="s4" class="clip" data-composition-id="s4-cta" data-composition-src="compositions/s4-cta.html"
    data-start="16" data-duration="4" data-track-index="0"></div>

  <!-- Transitions — 0.6s crossfades for speed -->
  <div id="t12" class="clip" data-start="2.7" data-duration="0.6" data-track-index="10"
    data-transition="true" data-transition-from="s1" data-transition-to="s2" data-transition-type="crossfade"></div>

  <div id="t23" class="clip" data-start="5.7" data-duration="0.6" data-track-index="10"
    data-transition="true" data-transition-from="s2" data-transition-to="s3" data-transition-type="crossfade"></div>

  <div id="t34" class="clip" data-start="15.7" data-duration="0.6" data-track-index="10"
    data-transition="true" data-transition-from="s3" data-transition-to="s4" data-transition-type="crossfade"></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    window.__timelines["tui-promo"] = gsap.timeline({ paused: true });
  </script>
</div>
</body>
</html>
