name: 'Bug Report'
description: 'Report a bug to help us improve gemini-cli-scanner'
labels:
  - 'type/bug'
  - 'status/triage'
body:
  - type: 'markdown'
    attributes:
      value: |-
        > [!IMPORTANT]
        > Thanks for taking the time to fill out this bug report!
        >
        > Please search **[existing issues](https://github.com/pauldatta/gemini-cli-scanner/issues)** to see if an issue already exists for the bug you encountered.

  - type: 'textarea'
    id: 'problem'
    attributes:
      label: 'What happened?'
      description: 'A clear and concise description of what the bug is.'
    validations:
      required: true

  - type: 'textarea'
    id: 'expected'
    attributes:
      label: 'What did you expect to happen?'
    validations:
      required: true

  - type: 'textarea'
    id: 'reproduce'
    attributes:
      label: 'Steps to reproduce'
      description: 'How can we reproduce this issue?'
      value: |-
        1. Run `npx gemini-cli-scanner`
        2. Select '...'
        3. See error

  - type: 'input'
    id: 'version'
    attributes:
      label: 'Scanner version'
      description: 'Run `npx gemini-cli-scanner --version` to find this.'
      placeholder: 'e.g. 3.3.1'
    validations:
      required: true

  - type: 'dropdown'
    id: 'os'
    attributes:
      label: 'Operating System'
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: 'textarea'
    id: 'additional-context'
    attributes:
      label: 'Additional context'
      description: 'Add any other context, screenshots, or terminal output about the problem here.'
